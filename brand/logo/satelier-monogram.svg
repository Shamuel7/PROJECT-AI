<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 240 240"
     role="img"
     aria-label="S'Atelier — monogramă">
  <title>S'Atelier — monogramă</title>
  <desc>Monogramă circulară cu „SA" interțesut, potrivită pentru favicon, ștampilă sau etichetă cusută.</desc>

  <defs>
    <style>
      .ring   { fill: none; stroke: #1a1a1a; stroke-width: 2; }
      .ring-g { fill: none; stroke: #b8860b; stroke-width: 1; }
      .mono   {
        font-family: "Didot", "Bodoni 72", "Playfair Display", "Cormorant Garamond", "Georgia", serif;
        font-weight: 500;
        fill: #1a1a1a;
      }
      .year {
        font-family: "Futura", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
        font-weight: 300;
        letter-spacing: 0.4em;
        fill: #1a1a1a;
      }
    </style>
  </defs>

  <!-- Inele ornamentale -->
  <circle class="ring"   cx="120" cy="120" r="112"/>
  <circle class="ring-g" cx="120" cy="120" r="104"/>

  <!-- Litera S mare, italic, suprapusă cu A -->
  <g text-anchor="middle">
    <text class="mono" x="120" y="150" font-size="150" font-style="italic">S</text>
    <!-- A mai mic, în auriu, așezat pe coada S-ului -->
    <text class="mono" x="152" y="160" font-size="60" fill="#b8860b">A</text>
  </g>

  <!-- Text curbat: „ATELIER DE CREAȚIE" sus -->
  <defs>
    <path id="arc-top" d="M 28,120 A 92,92 0 0 1 212,120"/>
    <path id="arc-bot" d="M 36,128 A 84,84 0 0 0 204,128"/>
  </defs>
  <text class="year" font-size="10">
    <textPath href="#arc-top" startOffset="50%" text-anchor="middle">
      S · A T E L I E R
    </textPath>
  </text>
  <text class="year" font-size="9" fill="#b8860b">
    <textPath href="#arc-bot" startOffset="50%" text-anchor="middle">
      M A I S O N   ·   E S T. 2 0 2 6
    </textPath>
  </text>

  <!-- Mici ornamente laterale -->
  <g fill="#b8860b">
    <circle cx="20"  cy="120" r="2"/>
    <circle cx="220" cy="120" r="2"/>
  </g>
</svg>
