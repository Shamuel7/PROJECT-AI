<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 520 160"
     role="img"
     aria-label="S'Atelier — variantă minimală">
  <title>S'Atelier — minimal</title>
  <desc>Variantă minimalistă, doar wordmark cu apostrof auriu, pentru header-uri, semnături email și ambalaje.</desc>

  <defs>
    <style>
      .ink {
        fill: #1a1a1a;
        font-family: "Didot", "Bodoni 72", "Playfair Display", "Cormorant Garamond", "Georgia", serif;
        font-weight: 400;
        letter-spacing: 0.04em;
      }
      .accent { fill: #b8860b; }
    </style>
  </defs>

  <text x="260" y="100"
        class="ink"
        text-anchor="middle"
        font-size="72">S<tspan class="accent">’</tspan>Atelier</text>

  <!-- Linie subtilă sub wordmark -->
  <line x1="180" y1="122" x2="340" y2="122" stroke="#b8860b" stroke-width="0.8"/>
</svg>
